<div class="w-75 container py-5">
    <div class="card shadow-lg p-4 rounded-4">
        <!-- @if (perfumeObtenido){
            <h2 class="fw-bold">{{ perfumeObtenido.nombre }}</h2>
        } @else {
            <div class="alert alert-warning mt-3">
                No hay productos para mostrar
            </div>
        } -->

        @if (showMod) {
            <div class="card shadow-lg p-4 mx-auto">
            <form [formGroup]="modificarForm" (ngSubmit)="onModify(modID)">
                <!-- Nombre -->
                <div class="mt-3">
                    <label for="mod-1" class="form-label">Nombre</label><br>
                    <input type="text" class="form-control" id="mod-1" formControlName="nombre" >
                </div>
                <!-- Precio -->
                <div class="mt-3">
                    <label for="mod-2" class="form-label">Precio</label><br>
                    <input type="number" class="form-control" id="mod-2" formControlName="precio">
                </div>
                <!-- Cantidad -->
                <div class="mt-3">
                    <label for="mod-3" class="form-label">Cantidad</label><br>
                    <input type="number" class="form-control" id="mod-3" formControlName="cantidad">
                </div>
                <!-- Marca -->
                <div class="mt-3">
                    <label for="mod-4" class="form-label">Marca</label><br>
                    <input type="text" class="form-control" id="mod-4" formControlName="marca">
                </div>
                <!-- Proveedor -->
                <div class="mt-3">
                    <label for="mod-5" class="form-label">Proveedor</label><br>
                    <input type="text" class="form-control" id="mod-5" formControlName="proveedor">
                </div>
                <!-- Tipo -->
                <div class="mt-3">
                    <label for="mod-6" class="form-label">Tipo</label><br>
                    <input type="text" class="form-control" id="mod-6" formControlName="tipo">
                </div>
                <!-- Linea -->
                <div class="mt-3">
                    <label for="mod-7" class="form-label">Linea</label>
                    <input type="text" class="form-control" id="mod-7" formControlName="linea">
                </div>
                <!-- AROMA -->
                <label class="form-label">Aroma</label><br>
                <!-- Salida -->
                <div class="mt-3">
                    <label for="mod-8" class="form-label">Salida</label><br>
                    <input type="text" class="form-control" id="mod-8" formControlName="aroma_salida">
                </div>
                <!-- Corazon -->
                <div class="mt-3">
                    <label for="mod-9" class="form-label">Corazon</label>
                    <input type="text" class="form-control" id="mod-9" formControlName="aroma_corazon">
                </div>
                <!-- Fondo -->
                <div class="mt-3">
                    <label for="mod-10" class="form-label">Fondo</label>
                    <input type="text" class="form-control" id="mod-10" formControlName="aroma_fondo">
                </div>
                <button type="submit">Modificar este producto</button>
                <button type="reset">Reestablecer datos antes de modificar producto</button>
            </form>
            </div>
        }

    </div>
</div>
